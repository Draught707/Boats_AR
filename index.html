<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width"
    />
    <title>AR на полу — без маркера</title>

    <script src="libs/aframe.min.js"></script>
    <script src="libs/ar-hit-test.js"></script>

    <script>
      AFRAME.registerComponent("place-model-on-select", {
        init: function () {
          const sceneEl = this.el;
          const modelEl = document.querySelector("#my-model");

          sceneEl.addEventListener("ar-hit-test-start", function () {
            console.log("AR hit-test started");
          });

          sceneEl.addEventListener("ar-hit-test-achieved", function () {
            console.log("Surface found");
          });

          sceneEl.addEventListener("ar-hit-test-select", function (e) {
            console.log("Placed:", e.detail);
            if (modelEl) modelEl.setAttribute("visible", "true");
          });
        },
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene
      webxr="requiredFeatures: hit-test,local-floor;"
      ar-hit-test="target:#my-model;"
      place-model-on-select
      renderer="colorManagement: true"
    >
      <a-assets>
        <a-asset-item id="model" src="static/models/scene.gltf"></a-asset-item>
      </a-assets>

      <a-entity
        id="my-model"
        gltf-model="#model"
        visible="false"
        position="0 0 0"
        rotation="-90 0 0"
        scale="0.5 0.5 0.5"
      ></a-entity>

      <a-entity camera look-controls></a-entity>
    </a-scene>
  </body>
</html>
