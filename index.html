<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <title>AR с маркером</title>
    
    <!-- Подключаем ЛОКАЛЬНЫЕ файлы из папки libs -->
    <script src="libs/aframe-master.min.js"></script>
    <script src="libs/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <!-- Активируем AR.js в маркерном режиме -->
    <a-scene arjs="sourceType: webcam; debugUIEnabled: true;">
      
      <!-- Используем стандартный маркер HIRO -->
      <a-marker preset="hiro">
        <!-- Ваша CAD-модель -->
        <a-entity
          gltf-model="static/models/scene.gltf"
          position="0 0 0"
          rotation="-90 0 0"
          scale="0.5 0.5 0.5"
        ></a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
