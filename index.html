<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <title>AR с маркером</title>
    
    <!-- Подключаем ЛОКАЛЬНЫЕ файлы из папки libs -->
    <script src="libs/aframe-master.min.js"></script>
    <script src="libs/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <!-- Активируем AR.js в маркерном режиме -->
    <a-scene arjs="sourceType: webcam; debugUIEnabled: true;">
      
      <!-- Используем стандартный маркер HIRO -->
      <a-marker preset="hiro">
        <!-- Ваша CAD-модель -->
        <a-entity
          glb-model="static/models/SB_A6_BR-optimized.glb"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-entity>
        <!-- Добавьте визуальный индикатор, что маркер найден -->
        <a-box position="0 0 -0.5" color="red" width="1" height="1" depth="0.1"></a-box>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
  
  <script>
document.addEventListener('DOMContentLoaded', function() {
  const model = document.querySelector('[glb-model]');
  
  if (model) {
    model.addEventListener('model-loaded', function() {
      console.log('✅ МОДЕЛЬ ЗАГРУЖЕНА!');
    });
    
    model.addEventListener('model-error', function(e) {
      console.error('❌ ОШИБКА ЗАГРУЗКИ:', e.detail);
    });
  }
});
</script>
</html>
