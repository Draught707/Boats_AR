<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width"
    />
    <title>AR на полу — без маркера</title>
    <script src="libs/aframe-master.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene
      webxr="optionalFeatures: hit-test,local-floor;"
      ar-hit-test="target: #my-model;"
      renderer="colorManagement: true"
    >
      <a-assets>
        <a-asset-item id="model" src="static/models/scene.gltf"></a-asset-item>
      </a-assets>

      <a-entity
        id="my-model"
        gltf-model="#model"
        visible="false"
        position="0 0 0"
        rotation="-90 0 0"
        scale="0.5 0.5 0.5"
      ></a-entity>

      <a-entity camera look-controls></a-entity>
    </a-scene>
  </body>
</html>
