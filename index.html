<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width"
    />
    <title>AR с CAD-моделью</title>
    <!-- Подключаем библиотеки A-Frame и AR.js -->
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <!-- Сцена AR.js -->
    <a-scene embedded arjs>
      <!-- Определяем маркер (используем стандартный 'hiro') -->
      <a-marker preset="hiro">
        <!-- Сущность, которая будет содержать нашу 3D-модель -->
        <a-entity
          position="0 0 0"
          scale="0.5 0.5 0.5"
          gltf-model="/static/models/scene.gltf"
        >
        </a-entity>
      </a-marker>

      <!-- Камера -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
