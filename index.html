<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <title>AR на полу — без маркера</title>
    <!-- Загружаем A-Frame прямо из интернета -->
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene
      webxr="requiredFeatures: hit-test,local-floor;"
      ar-hit-test="target:#my-model;"
    >
      <a-entity
        id="my-model"
        gltf-model="/Boats_AR/static/models/scene.gltf"
        visible="false"
        position="0 0 0"
        rotation="-90 0 0"
        scale="0.5 0.5 0.5"
      ></a-entity>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
