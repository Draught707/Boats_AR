<!DOCTYPE html>
<html>
<head>
  <title>Тест камеры</title>
</head>
<body>
  <h1>Тест камеры</h1>
  <video id="video" autoplay playsinline style="width:100%; max-width:600px;"></video>
  <button id="start">Запустить камеру</button>
  <div id="status"></div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const button = document.getElementById('start');

    button.addEventListener('click', function() {
      status.textContent = 'Запрос камеры...';
      
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(stream) {
          video.srcObject = stream;
          status.textContent = '✅ Камера работает!';
        })
        .catch(function(err) {
          status.textContent = '❌ Ошибка: ' + err.message;
        });
    });
  </script>
</body>
</html>
